<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>행운의 로또 번호 생성기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="theme-toggle">
    <button id="theme-btn">🌙 다크 모드</button>
  </div>
  <h1>🍀 로또 번호 생성기</h1>
  <button id="generator">번호 생성하기</button>
  <div id="numbers"></div>

  <section class="contact-section">
    <h2>🤝 제휴 및 문의</h2>
    <form action="https://formspree.io/f/mqakpvgp" method="POST" id="contact-form">
      <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" placeholder="성함을 입력해주세요" required>
      </div>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="email@example.com" required>
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요" required></textarea>
      </div>
      <button type="submit" id="submit-btn">문의 보내기</button>
    </form>
  </section>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
